AWSTemplateFormatVersion: 2010-09-09
Description: IAM resources (role and instance profile) for the CKAD IDE environment.

Parameters:
  ParentStackName:
    Type: String
    Description: Base stack name used for naming IAM resources

Resources:
  TradingBotIdeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ParentStackName}-ide-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
                - ssm.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: ide-password
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetResourcePolicy
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                  - secretsmanager:ListSecretVersionIds
                Resource: "*"
              - Effect: Allow
                Action: secretsmanager:ListSecrets
                Resource: "*"
        - PolicyName: ide-get-role
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - iam:GetRole
                Resource: !Sub arn:aws:iam::${AWS::AccountId}:role/${ParentStackName}-ide-role
        - PolicyName: terraform-deployment-permissions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: "*"
                Resource: "*"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryPowerUser
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Path: "/"
  TradingBotIdeInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub ${ParentStackName}-ide-instance-profile
      Path: "/"
      Roles:
        - !Ref TradingBotIdeRole

Outputs:
  RoleArn:
    Description: IAM role ARN for the IDE instance
    Value: !GetAtt TradingBotIdeRole.Arn
  RoleName:
    Description: IAM role name for the IDE instance
    Value: !Ref TradingBotIdeRole
  InstanceProfileName:
    Description: Instance profile name for the IDE instance
    Value: !Ref TradingBotIdeInstanceProfile
  InstanceProfileArn:
    Description: Instance profile ARN for the IDE instance
    Value: !GetAtt TradingBotIdeInstanceProfile.Arn

